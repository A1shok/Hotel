<!DOCTYPE html>
<html>
<head>
<title>Hotel AI</title>
<style>
body { background:#0b1a2b; color:white; font-family:Arial; }
.card { background:#1e2f45; margin:10px; padding:10px; border-radius:8px; }
</style>
</head>

<body>

<h1>🏨 Hotel AI Operations</h1>

<h2>Active Tasks</h2>
<div id="active"></div>

<h2>Completed Tasks</h2>
<div id="completed"></div>

<script>
async function loadTasks(){
 const res = await fetch(window.location.origin + "/tasks");
 const data = await res.json();

 const active = document.getElementById("active");
 const completed = document.getElementById("completed");

 active.innerHTML="";
 completed.innerHTML="";

 data.forEach(t=>{
  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
   <b>#${t.id}</b> - ${t.message}<br>
   Priority: ${t.priority}<br>
   Time: ${t.time}
  `;

  if(t.status==="Completed"){
   completed.appendChild(div);
  }else{
   active.appendChild(div);
  }
 });
}

loadTasks();
setInterval(loadTasks,3000);
</script>

</body>
</html>
