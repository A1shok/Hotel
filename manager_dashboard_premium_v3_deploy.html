<!DOCTYPE html>
<html>
<head>
    <title>Hotel AI</title>
    <style>
        body {
            background: #0b1a2b;
            color: white;
            font-family: Arial;
            padding: 20px;
        }
        .task {
            background: #1e2f45;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>🏨 Hotel AI Operations</h1>

<h2>Active Tasks</h2>
<div id="tasks"></div>

<script>
async function loadTasks() {
    const res = await fetch(window.location.origin + "/tasks");
    const data = await res.json();

    const container = document.getElementById("tasks");
    container.innerHTML = "";

    data.forEach(task => {
        const div = document.createElement("div");
        div.className = "task";
        div.innerHTML = `
            <b>#${task.id}</b> - ${task.message}<br>
            Priority: ${task.priority}<br>
            Time: ${task.created_at}
        `;
        container.appendChild(div);
    });
}

loadTasks();
setInterval(loadTasks, 3000);
</script>

</body>
</html>
