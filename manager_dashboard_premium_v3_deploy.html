<!DOCTYPE html>
<html>
<head>
    <title>Hotel AI</title>
    <style>
        body {
            background: #0b1a2b;
            color: white;
            font-family: Arial;
            padding: 20px;
        }

        .card {
            background: #1e2f45;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .urgent { color: red; }
        .high { color: orange; }
        .medium { color: yellow; }
    </style>
</head>
<body>

<h1>🏨 Hotel AI Dashboard</h1>

<div id="tasks"></div>

<script>
async function loadTasks() {
    const res = await fetch(window.location.origin + "/tasks");
    const data = await res.json();

    const container = document.getElementById("tasks");
    container.innerHTML = "";

    data.forEach(t => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>#${t.id}</b> - ${t.message}<br>
            Priority: <span class="${t.priority}">${t.priority}</span><br>
            Time: ${t.time}
        `;

        container.appendChild(div);
    });
}

loadTasks();
setInterval(loadTasks, 3000);
</script>

</body>
</html>
